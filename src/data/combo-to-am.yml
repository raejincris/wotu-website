faq:
  - question: "Tôi đang ở chung cư 2PN, phòng khách 18m² — combo này có hợp không?"
    answer: "Cực kỳ phù hợp. Combo Tổ Ấm size M được thiết kế chuẩn cho phòng khách 16–22m². Sofa 3 chỗ dài 2.1m vừa khít tường thông thường (3.4–3.8m). Nếu phòng nhỏ hơn 16m², chọn size S. Để chắc, hãy gửi mặt bằng cho KTS Wotu — chúng tôi dựng 3D miễn phí trong 24h."
    open: true

  - question: "Thời gian giao hàng và lắp đặt mất bao lâu?"
    answer: "Trong nội thành Quy Nhơn và vùng lân cận Bình Định: <strong>48 giờ</strong> kể từ khi xác nhận đơn. Đội kỹ thuật của Wotu (không qua bên thứ ba) lắp đặt trong 2–3 giờ tại nhà bạn, kê dọn sạch và mang bao bì đi. Giao tỉnh xa: 5–7 ngày, có tính phí vận chuyển."

  - question: "Nếu sau khi lắp tôi không ưng, có đổi trả được không?"
    answer: "Có. Wotu áp dụng chính sách <strong>đổi trả miễn phí 30 ngày</strong> kể cả combo đã lắp đặt. Chỉ cần sản phẩm chưa hư hỏng nặng, đội Wotu sẽ tháo, mang đi và hoàn lại 100% giá trị (trừ chi phí giao tỉnh, nếu có)."

  - question: "Bảo hành 5 năm bao gồm những gì?"
    answer: "Bảo hành áp dụng cho <strong>khung gỗ và cấu trúc chính</strong>: cong vênh, mục mọt, gãy mộng, hư ray ngăn kéo. Vải bọc và đệm có chế độ <strong>2 năm</strong>. Trong thời gian bảo hành, Wotu hỗ trợ sửa hoặc thay miễn phí tại nhà."

  - question: "Có hỗ trợ trả góp 0% không?"
    answer: "Có. Wotu liên kết với Home Credit và Shinhan Bank cho gói trả góp <strong>6 / 12 / 18 / 24 tháng — lãi suất 0%</strong>. Hồ sơ chỉ cần CCCD. Combo Tổ Ấm trả góp 12 tháng = 1.575.000đ/tháng."

  - question: "Tôi muốn đổi 1 món trong combo, được không?"
    answer: "Được. Bạn có thể thay sofa size S/M/L, hoặc đổi tông màu khác, hoặc bỏ thảm để tự chọn. Liên hệ KTS Wotu để được điều chỉnh combo theo nhu cầu — giá sẽ được tính lại tương ứng."

