philosophy:
  number: /01
  label: Triết lý
  heading: Chúng tôi không thiết kế để được <em>nhìn ngắm</em> — chúng tôi thiết kế để được <em class="accent">sống trong</em>.
  paragraphs:
    - Mỗi dự án bắt đầu bằng việc lắng nghe — không gian, gia chủ, ánh sáng buổi sớm và tiếng ồn bên ngoài cửa sổ. Từ đó, hình hài của ngôi nhà mới hiện ra một cách tự nhiên, không cần phải gắng sức.
    - Vật liệu được lựa chọn vì nó già đẹp theo thời gian. Chi tiết được giữ lại vì nó cần thiết. Khoảng trống được dành chỗ vì đó là nơi ánh sáng đi qua và để lại một câu chuyện.
