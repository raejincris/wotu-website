projects:
  number: /03
  label: Selected works
  heading: Những <em>nơi</em> chốn.
  ctaLabel: Toàn bộ dự án →
process:
  number: /04
  label: Quy trình
  heading: Năm <em>chương</em>,<br/>một câu chuyện.
  intro: Trung bình một dự án nhà ở tại WOTU kéo dài 6–9 tháng. Chúng tôi không vội — vì những thứ bền lâu thì cần thời gian.
  steps:
    - n: '01'
      t: Lắng nghe
      d: Gặp gỡ, đọc hiện trạng, hiểu nhịp sống và ngân sách. Không vẽ trước khi hiểu.
    - n: '02'
      t: Định hình
      d: Concept design, layout, mood vật liệu. 3 phương án để cùng chọn lựa.
    - n: '03'
      t: Bản vẽ
      d: Bản vẽ kỹ thuật, chi tiết hoàn thiện. Bóc tách khối lượng và bảng giá minh bạch.
    - n: '04'
      t: Thi công
      d: Phần thô, M&E, hoàn thiện. Báo cáo tiến độ ảnh và video hằng tuần.
    - n: '05'
      t: Trao chìa khoá
      d: Stylings, đồ gỗ riêng, ánh sáng. Bạn mở cửa, bước vào, và ở.
about:
  number: /05
  label: Studio
  heading: Một studio<br/>nhỏ, <em>kỹ tính</em>.
  body: WOTU là studio thiết kế và thi công nội thất, đặt cơ sở tại Quy Nhơn từ 2018. Chúng tôi nhận có giới hạn — để mỗi dự án đều được dõi theo bằng đôi mắt của chính những người đã vẽ ra chúng.
  ctaLabel: Về chúng tôi
  stats:
