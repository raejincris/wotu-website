quote:
  number: /06
  label: Lời kể của khách
  text: WOTU không bán cho tôi một thiết kế. Họ ngồi xuống, hỏi tôi về buổi sáng yêu thích — và rồi sáu tháng sau, họ trao lại tôi đúng buổi sáng ấy, dưới một mái nhà.
  author: NGUYỄN ANH M. — gia chủ dự án 014, Quy Nhon.
  year: '2025'
