title: "Câu hỏi thường gặp"
description: "Giải đáp thắc mắc về sản phẩm, đặt hàng, giao hàng và dịch vụ WOTU — tất cả những gì bạn cần biết trước khi quyết định."
template: shop
blocks:
  - id: hero
    type: richText
    eyebrow: "Hỗ trợ"
    heading: "Câu hỏi <em>thường gặp</em>"
    body: "<p>Dưới đây là những câu hỏi khách hàng hay gặp nhất. Không thấy câu hỏi của mình? Gọi <strong>0933 774 708</strong> hoặc nhắn vào Facebook — chúng tôi phản hồi trong giờ hành chính.</p>"
    align: left

  - id: faq-san-pham
    type: faq
    heading: "Sản phẩm &amp; Chất lượng"
    items:
      - question: "Gỗ WOTU dùng là loại gỗ gì?"
        answer: "<p>Chúng tôi chủ yếu dùng <strong>gỗ cao su</strong> (rubber wood) và <strong>gỗ tần bì</strong> (ash) cho nội thất sinh hoạt — bền, ít cong vênh, vân đẹp. Một số dòng cao cấp dùng gỗ óc chó (walnut) hoặc gỗ sồi (oak) theo yêu cầu. Mọi sản phẩm đều qua sấy đạt độ ẩm 8–12% trước khi gia công.</p>"
        open: true
      - question: "Vải bọc sofa có bền không, vết bẩn có dễ tẩy không?"
        answer: "<p>WOTU dùng vải microfiber và vải linen pha cotton — bền màu, chống mài mòn tốt. Đối với vết bẩn thông thường: lau ngay bằng khăn ẩm là đủ. Vết dầu hoặc vết màu: dùng nước tẩy vải chuyên dụng, tránh thuốc tẩy gốc clo.</p>"
      - question: "Màu sắc thực tế có khác ảnh trên web không?"
        answer: "<p>Chênh lệch nhỏ là không thể tránh do màn hình mỗi người hiển thị khác nhau. Để chắc chắn, bạn có thể yêu cầu mẫu vật liệu (chip vải, tấm gỗ mẫu) gửi qua đường bưu điện — miễn phí trong nội tỉnh Bình Định.</p>"
      - question: "Tôi có thể đặt kích thước tuỳ chỉnh không?"
        answer: "<p>Có. WOTU nhận đặt hàng theo kích thước riêng cho hầu hết sản phẩm gỗ. Thời gian sản xuất thêm 5–10 ngày so với hàng catalog. Giá tuỳ chỉnh báo sau khi xác nhận bản vẽ.</p>"

  - id: faq-dat-hang
    type: faq
    heading: "Đặt hàng &amp; Thanh toán"
    items:
      - question: "Quy trình đặt hàng như thế nào?"
        answer: "<p>1. Liên hệ qua form tư vấn hoặc hotline → 2. Nhận báo giá chi tiết trong 24h → 3. Ký hợp đồng + đặt cọc 30% → 4. Sản xuất 15–25 ngày → 5. Giao và lắp đặt → 6. Thanh toán phần còn lại khi nghiệm thu.</p>"
        open: true
      - question: "Tôi có thể xem hàng trực tiếp trước khi đặt không?"
        answer: "<p>Có. Xưởng WOTU tại <strong>Lô 17-18 Hoa Lư, Quy Nhơn</strong> mở cửa thứ 2–thứ 7, 8h–17h30. Bạn có thể đến xem mẫu vật liệu, màu sơn và sản phẩm mẫu. Gọi trước để chúng tôi chuẩn bị tư vấn viên.</p>"
      - question: "Chấp nhận những hình thức thanh toán nào?"
        answer: "<p>Chuyển khoản ngân hàng (Vietcombank, Techcombank, MB), ví MoMo, tiền mặt tại xưởng. Chưa hỗ trợ thẻ tín dụng quẹt trực tiếp.</p>"
      - question: "Tôi có thể huỷ đơn sau khi đặt cọc không?"
        answer: "<p>Nếu huỷ trước khi sản xuất (thường trong 48h đầu), hoàn cọc 100%. Nếu huỷ sau khi đã bắt đầu sản xuất, cọc giữ lại một phần tương ứng với chi phí vật liệu đã cắt. Chi tiết ghi rõ trong hợp đồng.</p>"

  - id: faq-giao-lap
    type: faq
    heading: "Giao hàng &amp; Lắp đặt"
    items:
      - question: "Thời gian giao hàng là bao lâu?"
        answer: "<p>Hàng có sẵn trong catalog: <strong>5–10 ngày</strong>. Đặt riêng theo yêu cầu: <strong>20–30 ngày</strong>. Thời gian chạy từ khi ký hợp đồng và đặt cọc.</p>"
        open: true
      - question: "Giao hàng ngoài Quy Nhơn có được không?"
        answer: "<p>Có. WOTU giao toàn quốc qua xe tải chuyên dụng. Phí vận chuyển tính theo khoảng cách và khối lượng — chúng tôi báo cụ thể trước khi bạn xác nhận.</p>"
      - question: "Nhà tôi ở tầng cao không có thang máy thì sao?"
        answer: "<p>Đội thợ WOTU có kinh nghiệm vác đồ qua cầu thang. Tuy nhiên, với đồ cồng kềnh (giường king, tủ lớn), chúng tôi sẽ trao đổi trước để lên phương án phù hợp — đôi khi cần thêm nhân lực và phát sinh thêm phí nhỏ.</p>"

  - id: faq-baohanh
    type: faq
    heading: "Bảo hành &amp; Hậu mãi"
    items:
      - question: "Bảo hành bao lâu và bảo hành những gì?"
        answer: "<p><strong>5 năm</strong> cho cấu kiện gỗ và khung. <strong>12 tháng</strong> cho lớp sơn/hoàn thiện. <strong>24 tháng</strong> cho phụ kiện (bản lề, ray trượt, tay nắm). Xem đầy đủ tại trang <a href='/bao-hanh-doi-tra/'>Bảo hành &amp; Đổi trả</a>.</p>"
        open: true
      - question: "Tôi muốn đặt thêm ghế cùng bộ sau 1 năm, WOTU có làm được không?"
        answer: "<p>Có. Miễn là bộ gỗ đó vẫn trong danh mục sản xuất. Màu và vân gỗ tự nhiên có thể chênh nhẹ do lô gỗ khác nhau — chúng tôi sẽ thông báo trước khi bạn xác nhận.</p>"
      - question: "Liên hệ bảo hành bằng cách nào?"
        answer: "<p>Gọi <strong>0933 774 708</strong>, email <strong>hello@wotu.vn</strong>, hoặc nhắn vào Facebook WOTU. Vui lòng cung cấp số hợp đồng hoặc ngày mua và mô tả vắn tắt vấn đề.</p>"

