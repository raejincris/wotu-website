      - q: "WOTU có nhận thiết kế ngoài Quy Nhơn không?"
        a: "Có. Studio đặt tại Quy Nhơn (Gia Lai) nhưng nhận dự án ở Bình Định cũ, Gia Lai và các tỉnh lân cận. Phần lớn trao đổi có thể làm online, chỉ cần một vài buổi khảo sát tại công trình."
      - q: "Tôi chỉ cần thiết kế, không thi công có được không?"
        a: "Hoàn toàn được. Bạn nhận trọn bộ hồ sơ kỹ thuật và 3D để tự thi công hoặc thuê đội khác. Tuy vậy thiết kế và thi công cùng một nơi giúp tránh sai lệch giữa bản vẽ và thực tế."
