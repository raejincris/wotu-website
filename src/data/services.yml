    metaDescription: "WOTU thiết kế kiến trúc và nội thất tại Quy Nhơn, Gia Lai (Bình Định cũ) và toàn quốc — từ concept, quy hoạch không gian đến bản vẽ kỹ thuật và 3D. Đặt ánh sáng tự nhiên lên trước."
    lede: "Chúng tôi vẽ ánh sáng trước khi vẽ đồ đạc. Một bản thiết kế tốt không bắt đầu từ catalogue nội thất — nó bắt đầu từ hướng nắng, độ sâu hiên và nhịp sống thật của gia đình bạn."
    intro:
      - "Tại WOTU, thiết kế là giai đoạn quyết định 80% chất lượng của ngôi nhà. Chúng tôi quy hoạch không gian dựa trên ba thứ: ánh sáng tự nhiên, công năng thực tế và thói quen sinh hoạt của người ở — không phải xu hướng trên Pinterest."
      - "Mỗi hồ sơ thiết kế đều có bản vẽ kỹ thuật đủ để thi công chính xác và bản 3D để bạn nhìn thấy không gian trước khi đặt viên gạch đầu tiên. Studio đặt tại Quy Nhơn, nhận dự án tại Gia Lai (Bình Định cũ) và các tỉnh lân cận."
    includesTitle: "Bao gồm trong dịch vụ thiết kế"
    includes:
      - "Khảo sát hiện trạng & tư vấn ý tưởng (concept design)"
      - "Quy hoạch mặt bằng công năng theo ánh sáng và lối đi"
      - "Bản vẽ kỹ thuật thi công (kiến trúc, điện nước, chi tiết nội thất)"
      - "Phối cảnh 3D từng không gian để duyệt trước"
      - "Hồ sơ vật liệu & bảng màu hoàn thiện"
      - "Thiết kế đồ gỗ đặt riêng theo kích thước thật"
    process:
      - { t: "Gặp & lắng nghe", d: "Hiểu nhu cầu, ngân sách và cách bạn thật sự sống trong nhà." }
      - { t: "Concept & mặt bằng", d: "Đề xuất ý tưởng, quy hoạch không gian, chốt phương án." }
      - { t: "3D & vật liệu", d: "Dựng phối cảnh, chọn vật liệu, duyệt từng chi tiết." }
      - { t: "Hồ sơ kỹ thuật", d: "Bàn giao bản vẽ đủ để thi công không sai lệch." }
    faq:
      - q: "Chi phí thiết kế nội thất ở Quy Nhơn tính thế nào?"
        a: "Phí thiết kế tính theo m² sàn và mức độ chi tiết của hồ sơ. WOTU báo giá minh bạch sau buổi khảo sát đầu tiên, và phí thiết kế được khấu trừ một phần nếu bạn thi công trọn gói cùng chúng tôi."
      - q: "Thời gian hoàn thành hồ sơ thiết kế mất bao lâu?"
