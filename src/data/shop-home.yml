reviews:
  - quote: "Đặt nguyên combo Tổ Ấm, đội WOTU giao và lắp trong buổi sáng. Cuối ngày là đã ngồi xem TV với gia đình. Quá tiện cho người mới về nhà mới."
    name: "Nguyễn Hà My"
    role: "Nhơn Bình · Quy Nhơn"
    initial: "N"

  - quote: "Gỗ thật, đường ráp gọn, không có mùi sơn công nghiệp như mấy chỗ rẻ. Trẻ con nhà mình ngủ trong combo Vườn Cổ Tích từ tháng đầu vẫn ổn."
    name: "Trần Quốc Trung"
    role: "Trần Phú · Quy Nhơn"
    initial: "T"

  - quote: "Mình là dân thiết kế nên khá kỹ tính. WOTU tư vấn xong còn dựng 3D phòng cho xem trước. Combo An Yên hợp tông căn hộ của mình bất ngờ."
    name: "Lê Phương Linh"
    role: "Tuy Phước · Bình Định"
    initial: "L"
