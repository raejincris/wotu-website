# Sveltia CMS config — schema cho website wotu.vn
# Khi user save → CMS commit thẳng lên branch `main` của GitHub repo →
# platform deploy auto-rebuild trong 1-2 phút → site live.
#
# Site có 2 phần:
#   - Shop /  /san-pham/  /combo/... — content combo/bestsellers/reviews
#     đang HARDCODE trong .astro page (chưa CMS-ify). Khi cần edit qua CMS,
#     bổ sung collection combos/products/reviews ở đây + extract YAML.
#   - Studio /studio/ — Dự án + Nhật ký + Trang chủ + Footer/Menu — đều CMS.
#
# Site collection (site.yml) dùng CHUNG cho cả 2 phần (hotline, email, địa chỉ,
# social) — sửa 1 lần áp lên cả Shop và Studio footer.

backend:
  name: github
  repo: raejincris/wotu-website
  branch: main
  # OAuth bridge: Sveltia CMS Auth Worker giữ Client Secret server-side.
  # GitHub không hỗ trợ PKCE flow public, nên cần proxy.
  base_url: https://wotu-cms-auth.raejin-cris.workers.dev
  auth_endpoint: auth

# Local dev: chạy `npx @sveltia/cms-proxy-server` rồi truy cập /admin tại localhost.
local_backend: true

# Tất cả ảnh upload qua CMS lưu ở public/uploads/ và commit vào git.
media_folder: 'public/uploads'
public_folder: '/uploads'

# Branding panel admin
site_url: https://www.wotu.vn
display_url: https://www.wotu.vn
logo_url: /logo.svg

# I18n disabled — site chỉ tiếng Việt
i18n: false

collections:
  # ============================================================
  # 1. PROJECTS — case study dự án (/studio/projects/[slug])
  # ============================================================
  - name: projects
    label: 'Dự án Studio'
    label_singular: 'Dự án'
    folder: 'src/content/projects'
    create: true
    delete: true
    slug: '{{slug}}'
    extension: md
    format: yaml-frontmatter
    media_folder: '/public/uploads/projects'
    public_folder: '/uploads/projects'
    summary: '{{name}} · {{loc}}'
    sortable_fields: ['order', 'year', 'name']
    fields:
      - { name: name, label: 'Tên dự án', widget: string, hint: 'VD: Nhà giữa đồi thông' }
      - { name: id, label: 'Mã số', widget: string, hint: '3 chữ số, VD: 014' }
      - { name: loc, label: 'Địa điểm', widget: string, hint: 'VD: Đà Lạt · 2025' }
      - name: cat
        label: 'Hạng mục'
        widget: select
        options: ['Nhà ở', 'Căn hộ', 'F&B', 'Cải tạo', 'Showroom', 'Văn phòng', 'Khác']
      - { name: year, label: 'Năm hoàn thành', widget: number, value_type: int, min: 2018, max: 2035, required: false }
      - name: tone
        label: 'Tông màu placeholder (khi chưa có ảnh)'
        widget: select
        options: ['warm', 'deep', 'light', 'dark']
        default: 'warm'
      - name: ratio
        label: 'Tỉ lệ ảnh card'
        widget: select
        options: ['4/5', '3/4', '16/9', '1/1']
        default: '4/5'
      - { name: order, label: 'Thứ tự hiển thị', widget: number, value_type: int, default: 0, hint: 'Số nhỏ hơn hiển thị trước' }
      - { name: excerpt, label: 'Tóm tắt 1 dòng', widget: text, required: false }
      - name: photo
        label: 'Ảnh bìa (card)'
        widget: image
        required: false
        hint: 'Upload ảnh dự án. Để trống nếu muốn dùng Unsplash ID phía dưới.'
      - { name: photoDetail, label: 'Ảnh hero trang chi tiết', widget: image, required: false, hint: 'Ảnh ngang 16:9 cho trang chi tiết' }
      - { name: photoAlt, label: 'Mô tả ảnh (alt text, SEO)', widget: string, required: false }
      - { name: body, label: 'Nội dung dự án', widget: markdown, hint: 'Câu chuyện về dự án, vật liệu, ánh sáng...' }

  # ============================================================
  # 2. BLOG (Nhật ký) — bài viết studio (/studio/blog/[slug])
  # ============================================================
  - name: blog
    label: 'Nhật ký Studio'
    label_singular: 'Bài viết'
    folder: 'src/content/blog'
    create: true
    delete: true
    slug: '{{slug}}'
    extension: md
    format: yaml-frontmatter
    media_folder: '/public/uploads/blog'
    public_folder: '/uploads/blog'
    summary: '{{title}} — {{date | date(\"DD/MM/YYYY\")}}'
    sortable_fields: ['date', 'title']
    fields:
      - { name: title, label: 'Tiêu đề', widget: string }
      - { name: date, label: 'Ngày xuất bản', widget: datetime, format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false }
      - { name: excerpt, label: 'Tóm tắt 1 dòng', widget: text, required: false }
      - name: tone
        label: 'Tông màu placeholder'
        widget: select
        options: ['warm', 'deep', 'light', 'dark']
        default: 'warm'
      - { name: photo, label: 'Ảnh bìa', widget: image, required: false }
      - { name: photoAlt, label: 'Mô tả ảnh (alt text)', widget: string, required: false }
      - { name: body, label: 'Nội dung bài', widget: markdown }

  # ============================================================
  # 3. SITE — thông tin chung WOTU (địa chỉ, hotline, social)
  #    Áp dụng CẢ Shop và Studio footer. Sửa 1 lần — đồng bộ 2 nơi.
  # ============================================================
  - name: site
    label: 'Thông tin chung WOTU'
    files:
      - name: site
        label: 'Hotline · email · địa chỉ · social'
        file: 'src/data/site.yml'
        fields:
          - { name: tagline, label: 'Tagline (Studio)', widget: string }
          - { name: description, label: 'Mô tả SEO', widget: text }
          - { name: slogan, label: 'Slogan tiếng Anh (hiển thị footer)', widget: string, required: false, hint: 'VD: We don''t sell furniture, we sell satisfaction' }
          - name: address
            label: 'Địa chỉ'
            widget: object
            fields:
              - { name: line1, label: 'Đường / Lô', widget: string, hint: 'VD: Lô 17-18 Hoa Lư' }
              - { name: city, label: 'Thành phố / Tỉnh', widget: string, hint: 'VD: Quy Nhơn, Gia Lai' }
              - { name: mapsUrl, label: 'Google Maps URL', widget: string, required: false, hint: 'Short URL từ maps.app.goo.gl' }
          - { name: hotline, label: 'Hotline', widget: string }
          - { name: email, label: 'Email', widget: string }
          - name: social
            label: 'Mạng xã hội'
            widget: object
            fields:
              - { name: facebook, label: 'Facebook chính (Nội thất Quy Nhơn) URL', widget: string, required: false }
              - { name: facebookWorkshop, label: 'Facebook Xưởng URL', widget: string, required: false }
              - { name: maps, label: 'Google Maps URL (lặp lại địa chỉ)', widget: string, required: false }
          - name: meta
            label: 'Meta'
            widget: object
            fields:
              - { name: est, label: 'Năm thành lập', widget: string }
              - { name: location, label: 'Địa điểm header', widget: string }
              - { name: issueNumber, label: 'Số ấn (vd 014 / MMXXVI)', widget: string }
          - name: forms
            label: 'Form Contact (Web3Forms)'
            widget: object
            hint: 'Web3Forms access key + tiêu đề email khi nhận submit. Đổi key tại web3forms.com.'
            fields:
              - { name: contactAccessKey, label: 'Access Key (UUID)', widget: string }
              - { name: contactSubject, label: 'Tiêu đề email khi nhận submit', widget: string }
          - name: analytics
            label: 'Cloudflare Web Analytics'
            widget: object
            hint: 'Token lấy ở dash.cloudflare.com → Analytics & Logs → Web Analytics → Add a site → manual setup. Để trống = tắt analytics.'
            fields:
              - { name: cfBeaconToken, label: 'Beacon Token', widget: string, required: false }

  # ============================================================
  # 4. HOMEPAGE STUDIO — copy từng section trang chủ /studio/
  #    LƯU Ý: homepage SHOP / (cream + terracotta, combo nội thất) hiện
  #    hardcode trong src/pages/index.astro — chưa CMS-ify.
  # ============================================================
  - name: home
    label: 'Trang chủ Studio (/studio/)'
    files:
      - name: home
        label: 'Nội dung trang chủ Studio'
        file: 'src/data/home.yml'
        fields:
          - name: hero
            label: 'Hero (đầu trang)'
            widget: object
            fields:
              - { name: eyebrow, label: 'Eyebrow (chữ nhỏ trên tiêu đề)', widget: string }
              - { name: title, label: 'Tiêu đề lớn (HTML cho phép em, br/)', widget: text, hint: 'Có thể dùng <em>chữ nghiêng</em> và <br/> để xuống dòng' }
              - { name: intro, label: 'Đoạn intro', widget: text }
              - { name: cta, label: 'Nút CTA', widget: string }
              - { name: heroImage, label: 'Unsplash ID hero (legacy, có thể bỏ qua)', widget: string, required: false }
              - { name: heroAlt, label: 'Mô tả ảnh hero', widget: string, required: false }
          - name: marquee
            label: 'Dòng chữ chạy'
            widget: object
            fields:
              - { name: items, label: 'Các từ', widget: list, field: { name: item, widget: string } }
          - name: philosophy
            label: 'Triết lý'
            widget: object
            fields:
              - { name: number, label: 'Số section (vd /01)', widget: string }
              - { name: label, label: 'Nhãn', widget: string }
              - { name: heading, label: 'Tiêu đề (cho phép em, em.accent)', widget: text }
              - { name: paragraphs, label: '2 đoạn văn', widget: list, field: { name: para, widget: text } }
          - name: services
            label: 'Dịch vụ'
            widget: object
            fields:
              - { name: number, label: 'Số section', widget: string }
              - { name: label, label: 'Nhãn', widget: string }
              - { name: heading, label: 'Tiêu đề', widget: string }
              - { name: meta, label: 'Meta phải', widget: string }
              - name: items
                label: 'Các dịch vụ'
                widget: list
                fields:
                  - { name: num, label: 'Số (/01,/02,/03)', widget: string }
                  - { name: title, label: 'Tên', widget: string }
                  - { name: em, label: 'Phụ đề (italic)', widget: string }
                  - { name: desc, label: 'Mô tả', widget: text }
                  - { name: tags, label: 'Tags', widget: list, field: { name: tag, widget: string } }
                  - { name: photoId, label: 'Unsplash ID ảnh', widget: string, required: false }
                  - { name: photoAlt, label: 'Mô tả ảnh', widget: string, required: false }
          - name: projects
            label: 'Dự án (block trên trang chủ)'
            widget: object
            fields:
              - { name: number, label: 'Số section', widget: string }
              - { name: label, label: 'Nhãn', widget: string }
              - { name: heading, label: 'Tiêu đề', widget: string }
              - { name: ctaLabel, label: 'Nút "Xem tất cả"', widget: string }
          - name: process
            label: 'Quy trình'
            widget: object
            fields:
              - { name: number, label: 'Số section', widget: string }
              - { name: label, label: 'Nhãn', widget: string }
              - { name: heading, label: 'Tiêu đề', widget: text }
              - { name: intro, label: 'Đoạn giới thiệu', widget: text }
              - name: steps
                label: '5 bước quy trình'
                widget: list
                fields:
                  - { name: n, label: 'Số (01-05)', widget: string }
                  - { name: t, label: 'Tên bước', widget: string }
                  - { name: d, label: 'Mô tả bước', widget: text }
          - name: about
            label: 'Studio (about)'
            widget: object
            fields:
              - { name: number, label: 'Số section', widget: string }
              - { name: label, label: 'Nhãn', widget: string }
              - { name: heading, label: 'Tiêu đề', widget: text }
              - { name: body, label: 'Đoạn văn', widget: text }
              - { name: ctaLabel, label: 'Nút CTA', widget: string }
              - name: stats
                label: 'Số liệu'
                widget: list
                fields:
                  - { name: n, label: 'Con số', widget: string }
                  - { name: l, label: 'Nhãn', widget: string }
          - name: quote
            label: 'Lời khách'
            widget: object
            fields:
              - { name: number, label: 'Số section', widget: string }
              - { name: label, label: 'Nhãn', widget: string }
              - { name: text, label: 'Nội dung trích dẫn', widget: text }
              - { name: author, label: 'Tác giả trích dẫn', widget: string }
              - { name: year, label: 'Năm', widget: string }
          - name: contact
            label: 'Form liên hệ'
            widget: object
            fields:
              - { name: number, label: 'Số section', widget: string }
              - { name: label, label: 'Nhãn', widget: string }
              - { name: heading, label: 'Tiêu đề lớn', widget: text }
              - { name: successMessage, label: 'Thông báo gửi thành công', widget: text }
              - { name: submitLabel, label: 'Nhãn nút submit', widget: string }
              - name: fields
                label: 'Các ô input'
                widget: list
                fields:
                  - { name: label, label: 'Nhãn', widget: string }
                  - { name: name, label: 'name (kỹ thuật)', widget: string }
                  - { name: type, label: 'Loại', widget: select, options: ['text', 'email', 'tel', 'textarea'] }
                  - { name: placeholder, label: 'Placeholder', widget: string, required: false }

  # ============================================================
  # 5. FOOTER + NAV STUDIO
  #    Áp cho footer + Nav trên các route /studio/*.
  #    Shop / có Nav + Footer riêng (hardcode trong src/components/shop/).
  # ============================================================
  - name: footer
    label: 'Footer & Menu Studio'
    files:
      - name: footer
        label: 'Footer & Menu /studio/'
        file: 'src/data/footer.yml'
        fields:
          - { name: tagline, label: 'Tagline footer (cho phép br/)', widget: text }
          - { name: copyright, label: 'Dòng copyright', widget: string }
          - { name: signature, label: 'Chữ ký phải', widget: string }
          - name: columns
            label: '3 cột footer'
            widget: list
            fields:
              - { name: title, label: 'Tiêu đề cột', widget: string }
              - name: links
                label: 'Links'
                widget: list
                fields:
                  - { name: label, label: 'Nhãn', widget: string }
                  - { name: href, label: 'Đường dẫn', widget: string }
          - name: nav
            label: 'Menu trên cùng'
            widget: object
            fields:
              - name: links
                label: 'Các link'
                widget: list
                fields:
                  - { name: label, label: 'Nhãn', widget: string }
                  - { name: anchor, label: 'Anchor (vd services)', widget: string, required: false }
                  - { name: route, label: 'Route (vd /blog)', widget: string, required: false }

  # ============================================================
  # 6. SHOP — Trang chủ Shop / (combos, bestsellers, reviews, inspo)
  # ============================================================
  - name: shop_home
    label: 'Shop — Trang chủ (/)'
    files:
      - name: shop_home
        label: 'Combos · Bestsellers · Reviews · Cảm hứng'
        file: 'src/data/shop-home.yml'
        fields:
          - name: combos
            label: 'Combo nội thất (6 combo)'
            widget: list
            fields:
              - { name: id, label: 'ID (không dấu, gạch nối)', widget: string }
              - { name: name, label: 'Tên nhóm', widget: string, hint: 'VD: Combo' }
              - { name: nameEm, label: 'Tên nổi bật (in nghiêng)', widget: string, hint: 'VD: Tổ Ấm' }
              - { name: nameTail, label: 'Đuôi tên (tuỳ chọn)', widget: string, required: false }
              - { name: cat, label: 'Phân loại (badge trên card)', widget: string }
              - { name: desc, label: 'Mô tả ngắn', widget: text }
              - { name: priceOld, label: 'Giá gốc (gạch)', widget: string, hint: 'VD: 28.900.000đ' }
              - { name: priceNew, label: 'Giá khuyến mãi', widget: string, hint: 'VD: 18.900.000đ' }
              - { name: price, label: 'Giá số (dùng để sort)', widget: number, value_type: int }
              - { name: priceNote, label: 'Ghi chú giá', widget: string, hint: 'VD: · tiết kiệm 10 triệu' }
              - { name: badge, label: 'Badge label (tuỳ chọn)', widget: string, required: false }
              - name: badgeClass
                label: 'Màu badge'
                widget: select
                options: ['', sage, terra]
                required: false
              - { name: href, label: 'Đường dẫn trang combo', widget: string }
              - name: room
                label: 'Phòng (dùng để lọc tab)'
                widget: select
                options: [studio, phong-khach, phong-ngu, phong-an, lam-viec, tre-em]
              - name: tone
                label: 'Tông màu placeholder'
                widget: select
                options: ['', sage]
                default: ''
              - { name: placeholder, label: 'Alt text ảnh placeholder', widget: string }

          - name: bestsellers
            label: 'Bestsellers (4 sản phẩm nổi bật)'
            widget: list
            fields:
              - { name: id, label: 'ID sản phẩm', widget: string }
              - { name: name, label: 'Tên sản phẩm', widget: string }
              - { name: meta, label: 'Phân loại ngắn', widget: string, hint: 'VD: Sofa · 3 chỗ ngồi' }
              - { name: price, label: 'Giá hiển thị', widget: string, hint: 'VD: 6.900.000đ' }
              - { name: stars, label: 'Sao', widget: string, hint: 'VD: ★★★★★' }
              - { name: href, label: 'Đường dẫn', widget: string }
              - name: tone
                label: 'Tông màu placeholder'
                widget: select
                options: ['', sage]

          - name: inspo
            label: 'Ảnh cảm hứng (5 ô)'
            widget: list
            fields:
              - { name: label, label: 'Nhãn ảnh', widget: string }
              - { name: href, label: 'Đường dẫn khi click', widget: string }
              - { name: tall, label: 'Ô cao (ô đầu tiên)', widget: boolean, required: false, default: false }

          - name: reviews
            label: 'Đánh giá khách hàng (3 review trang chủ)'
            widget: list
            fields:
              - { name: name, label: 'Tên khách', widget: string }
              - { name: role, label: 'Địa chỉ', widget: string, hint: 'VD: Nhơn Bình · Quy Nhơn' }
              - { name: initial, label: 'Chữ cái đầu (avatar)', widget: string }
              - { name: quote, label: 'Nội dung đánh giá', widget: text }

  # ============================================================
  # 7. SHOP — Sản phẩm /san-pham/ (products, categories, filters)
  # ============================================================
  - name: shop_products
    label: 'Shop — Sản phẩm (/san-pham/)'
    files:
      - name: shop_products
        label: 'Danh sách 18 sản phẩm · Danh mục · Bộ lọc'
        file: 'src/data/shop-products.yml'
        fields:
          - name: products
            label: 'Sản phẩm (7 sản phẩm trước banner)'
            widget: list
            fields:
              - { name: id, label: 'ID', widget: string }
              - { name: name, label: 'Tên nhóm (VD: Sofa văng)', widget: string }
              - { name: nameEm, label: 'Tên nổi bật (VD: "Mây")', widget: string }
              - { name: nameTail, label: 'Đuôi tên (VD: 3 chỗ)', widget: string, required: false }
              - { name: cat, label: 'Phân loại (tooltip card)', widget: string }
              - { name: price, label: 'Giá hiển thị', widget: string }
              - { name: priceOld, label: 'Giá gốc (gạch)', widget: string, required: false }
              - { name: priceNum, label: 'Giá số (để sort)', widget: number, value_type: int }
              - { name: rating, label: 'Rating string (VD: 4.8)', widget: string }
              - { name: ratingNum, label: 'Rating số', widget: number, value_type: float }
              - { name: reviews, label: 'Số lượng đánh giá', widget: number, value_type: int }
              - { name: href, label: 'Đường dẫn trang chi tiết', widget: string }
              - name: room
                label: 'Phòng'
                widget: select
                options: [phong-khach, phong-ngu, phong-an, lam-viec, tre-em]
              - name: catKey
                label: 'Danh mục (category key)'
                widget: select
                options: [sofa, ban, ghe, giuong, tu, ke, den, tham]
              - name: tone
                label: 'Tông màu placeholder'
                widget: select
                options: ['', sage]

          - name: productsAfterCta
            label: 'Sản phẩm (11 sản phẩm sau banner)'
            widget: list
            fields:
              - { name: id, label: 'ID', widget: string }
              - { name: name, label: 'Tên nhóm', widget: string }
              - { name: nameEm, label: 'Tên nổi bật', widget: string }
              - { name: nameTail, label: 'Đuôi tên', widget: string, required: false }
              - { name: cat, label: 'Phân loại', widget: string }
              - { name: price, label: 'Giá hiển thị', widget: string }
              - { name: priceOld, label: 'Giá gốc (gạch)', widget: string, required: false }
              - { name: priceNum, label: 'Giá số', widget: number, value_type: int }
              - { name: rating, label: 'Rating string', widget: string }
              - { name: ratingNum, label: 'Rating số', widget: number, value_type: float }
              - { name: reviews, label: 'Số đánh giá', widget: number, value_type: int }
              - { name: href, label: 'Đường dẫn', widget: string }
              - name: room
                label: 'Phòng'
                widget: select
                options: [phong-khach, phong-ngu, phong-an, lam-viec, tre-em]
              - name: catKey
                label: 'Danh mục'
                widget: select
                options: [sofa, ban, ghe, giuong, tu, ke, den, tham]
              - name: tone
                label: 'Tông màu placeholder'
                widget: select
                options: ['', sage]

          - name: categories
            label: 'Danh mục (9 tiles)'
            widget: list
            fields:
              - { name: key, label: 'Key (để lọc)', widget: string, hint: 'Để trống = Tất cả' }
              - { name: name, label: 'Tên hiển thị', widget: string }
              - { name: count, label: 'Số lượng', widget: number, value_type: int }

  # ============================================================
  # 8. SHOP — Combo Tổ Ấm /combo/to-am/ (giá, FAQ, reviews, related)
  # ============================================================
  - name: combo_to_am
    label: 'Shop — Combo Tổ Ấm (/combo/to-am/)'
    files:
      - name: combo_to_am
        label: 'Giá · FAQ · Đánh giá · Related combos'
        file: 'src/data/combo-to-am.yml'
        fields:
          - { name: priceNow, label: 'Giá hiện tại', widget: string, hint: 'VD: 18.900.000đ' }
          - { name: priceWas, label: 'Giá gốc (gạch)', widget: string, hint: 'VD: 28.900.000đ' }
